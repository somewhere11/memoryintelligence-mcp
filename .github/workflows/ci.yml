name: CI

# Runs on the PUBLIC MIRROR (somewhere11/memoryintelligence-mcp).
# Inert in the monorepo — GitHub Actions only reads workflows from the repo root.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/
      - name: Test
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel and validate metadata
        run: |
          python -m pip install build twine
          python -m build
          twine check dist/*
